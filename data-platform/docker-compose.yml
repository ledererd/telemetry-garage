version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: telemetry-garage-db
    environment:
      POSTGRES_DB: telemetry
      POSTGRES_USER: telemetry_user
      POSTGRES_PASSWORD: telemetry_password
    ports:
      - "5432:5432"
    volumes:
      - telemetry-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry_user -d telemetry"]
      interval: 10s
      timeout: 5s
      retries: 5

  telemetry-api:
    build:
      context: ..
      dockerfile: data-platform/Containerfile
    container_name: telemetry-garage-telemetry-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=4
      - DB_TYPE=postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=telemetry
      - DB_USER=telemetry_user
      - DB_PASSWORD=telemetry_password
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  telemetry-db-data:
